<section class="disqus">
  <h5 class="separator">
    <span class="separator__title">Comments</span>
  </h5>

  <div id="disqus_thread"></div>

  <div id="disqus_disabled">You don't see comments because you didn't allow me to use functionality cookies. Do you want to <a href="javascript:resetCookies();">reset</a> your privacy settings?</div>

  <script type="text/plain" cookie-consent="functionality">$('#disqus_disabled').hide();</script>
  <script type="text/plain" cookie-consent="functionality">
    var disqus_config = function () {
    this.page.url = "{{ site.url }}{{ page.url }}";
    {% if page.disqus_identifier %}
    this.page.identifier = "{{ page.disqus_identifier }}";
    {% else%}
    this.page.identifier = "{{ page.url }}";
    {% endif %}
    };
    (function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://lenardev.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
    })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>
</section>
